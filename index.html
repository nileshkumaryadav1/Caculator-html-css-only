<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator by myself</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="calpanel">
        <input class="inputarea" type="text" placeholder="0" />

        <div class="btndiv">
          <div class="btnone btn">
            <button class="operator high">AC</button>
            <button class="operator high">DEL</button>
            <button class="operator high">%</button>
            <button class="operator high">/</button>
          </div>

          <div class="btntwo btn">
            <button class="operator">9</button>
            <button class="operator">8</button>
            <button class="operator">7</button>
            <button class="operator high">*</button>
          </div>

          <div class="btnthree btn">
            <button class="operator">6</button>
            <button class="operator">5</button>
            <button class="operator">4</button>
            <button class="operator high">-</button>
          </div>

          <div class="btnfour btn">
            <button class="operator">3</button>
            <button class="operator">2</button>
            <button class="operator">1</button>
            <button class="operator high">+</button>
          </div>

          <div class="btnfive btn">
            <button class="operator">00</button>
            <button class="operator">0</button>
            <button class="operator">.</button>
            <button class="operator highfi">=</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
